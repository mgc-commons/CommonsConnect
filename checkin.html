<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>チェックイン | Commons Connect</title><link rel="stylesheet" href="assets/css/style.css"></head>
<body>
<header class="topbar"><div class="brand">Commons Connect <small>Check-in</small></div><nav class="nav"><a href="index.html">サイネージ</a><a class="active" href="checkin.html">チェックイン</a></nav></header>
<div class="form-wrap"><div class="progress"><div id="progressBar" style="width:20%"></div></div>
<section class="step active"><div class="eyebrow">WELCOME TO COMMONS</div><h1>ようこそ！</h1><p class="lead" style="font-size:18px">今日のCommonsに参加して、共通の趣味から会話のきっかけを見つけましょう。</p><button class="btn next">チェックインする</button></section>
<section class="step"><h1>あなたのことを<br>教えてください</h1>
<div class="field"><label>お名前</label><input id="name" maxlength="30" placeholder="例：山田 太郎"></div>
<div class="field"><label>所属</label><input id="dept" maxlength="40" placeholder="例：研究企画部"></div>
<div class="field"><label>利用区分</label><select id="type"><option value="regular">レギュラー</option><option value="guest">ゲスト</option></select></div>
<div class="step-actions"><button class="btn alt prev">戻る</button><button class="btn next">次へ</button></div></section>
<section class="step"><h1>好きなものを<br>3つ選んでください</h1><p class="subtle" id="choiceGuide">0 / 3 選択中</p><div class="choice-grid" id="choices"></div>
<div class="step-actions"><button class="btn alt prev">戻る</button><button class="btn next">次へ</button></div></section>
<section class="step"><h1>ひとことだけ</h1><p class="subtle">プロフィールに表示されます。入力しなくても大丈夫です。</p>
<div class="field"><label>最近ハマっていること</label><textarea id="message" maxlength="40" rows="4" placeholder="例：木場のおいしいランチを開拓中"></textarea></div>
<div class="step-actions"><button class="btn alt prev">戻る</button><button class="btn" id="registerButton">登録する</button></div></section>
<section class="step"><div style="text-align:center;padding:30px 0"><div style="font-size:72px">🎉</div><h1>チェックイン完了！</h1><p class="lead" style="font-size:18px">サイネージへ自動で反映されました。</p><a class="btn" style="display:block" href="index.html">今日いる人を見る</a></div></section>
</div>
<script type="module" src="assets/js/checkin.js"></script></body></html>
