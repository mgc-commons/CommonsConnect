<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>チェックイン | Commons Connect</title><link rel="stylesheet" href="assets/style.css"></head>
<body>
<header class="topbar"><div class="brand">Commons Connect <small>Check-in</small></div><nav class="nav"><a href="index.html">サイネージ</a><a class="active" href="checkin.html">チェックイン</a><a href="manager.html">運営</a></nav></header>
<div class="form-wrap">
<div class="progress"><div id="progressBar" style="width:20%"></div></div>
<section class="step active">
<div class="eyebrow">WELCOME TO COMMONS</div><h1>ようこそ！</h1><p class="lead" style="font-size:18px">今日のCommonsに参加して、共通の趣味から会話のきっかけを見つけましょう。</p>
<button class="btn" onclick="nextStep()">チェックインする</button>
</section>
<section class="step">
<h1>あなたのことを<br>教えてください</h1>
<div class="field"><label>お名前</label><input id="name" placeholder="例：山田 太郎"></div>
<div class="field"><label>所属</label><input id="dept" placeholder="例：研究企画部"></div>
<div class="field"><label>利用区分</label><select id="type"><option value="regular">レギュラー</option><option value="guest">ゲスト</option></select></div>
<div class="step-actions"><button class="btn alt" onclick="prevStep()">戻る</button><button class="btn" onclick="nextStep()">次へ</button></div>
</section>
<section class="step">
<h1>好きなものを<br>3つ選んでください</h1><p class="subtle" id="choiceGuide">0 / 3 選択中</p><div class="choice-grid" id="choices"></div>
<div class="step-actions"><button class="btn alt" onclick="prevStep()">戻る</button><button class="btn" onclick="nextStep()">次へ</button></div>
</section>
<section class="step">
<h1>ひとことだけ</h1><p class="subtle">プロフィールに表示されます。入力しなくても大丈夫です。</p>
<div class="field"><label>最近ハマっていること</label><textarea id="message" maxlength="40" rows="4" placeholder="例：木場のおいしいランチを開拓中"></textarea></div>
<div class="step-actions"><button class="btn alt" onclick="prevStep()">戻る</button><button class="btn" onclick="register()">登録する</button></div>
</section>
<section class="step"><div style="text-align:center;padding:30px 0"><div style="font-size:72px">🎉</div><h1>チェックイン完了！</h1><p class="lead" style="font-size:18px">今日のCommonsへ参加しました。<br>サイネージにも反映されています。</p><a class="btn" style="display:block" href="index.html">今日いる人を見る</a></div></section>
</div>
<script src="assets/data.js"></script><script src="assets/app.js"></script>
<script>
const steps=[...document.querySelectorAll('.step')];let step=0;let selected=[];
document.getElementById('choices').innerHTML=window.HOBBIES.map(h=>`<button class="choice" data-name="${h.name}" onclick="toggleChoice(this)"><span>${h.icon}</span>${h.name}</button>`).join('');
function update(){steps.forEach((s,i)=>s.classList.toggle('active',i===step));document.getElementById('progressBar').style.width=((step+1)/steps.length*100)+'%'}
function nextStep(){
 if(step===1 && (!document.getElementById('name').value.trim()||!document.getElementById('dept').value.trim())){alert('お名前と所属を入力してください。');return}
 if(step===2 && selected.length!==3){alert('好きなものを3つ選んでください。');return}
 step=Math.min(step+1,steps.length-1);update()
}
function prevStep(){step=Math.max(step-1,0);update()}
function toggleChoice(el){
 const n=el.dataset.name;
 if(el.classList.contains('selected')){el.classList.remove('selected');selected=selected.filter(x=>x!==n)}
 else if(selected.length<3){el.classList.add('selected');selected.push(n)}
 document.getElementById('choiceGuide').textContent=`${selected.length} / 3 選択中`;
}
function register(){
 const data=getPeople();
 const p={id:Date.now(),name:document.getElementById('name').value.trim(),dept:document.getElementById('dept').value.trim(),avatar:'🙂',hobbies:selected,message:document.getElementById('message').value.trim()||'今日Commonsに来ています',type:document.getElementById('type').value,checked:true};
 data.push(p);savePeople(data);nextStep();
}
update();
</script></body></html>
