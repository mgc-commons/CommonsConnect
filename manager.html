<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Manager | Commons Connect</title><link rel="stylesheet" href="assets/style.css"></head>
<body>
<header class="topbar"><div class="brand">Commons Connect <small>Manager</small></div><nav class="nav"><a href="index.html">サイネージ</a><a href="checkin.html">チェックイン</a><a class="active" href="manager.html">運営</a><a href="studio.html">設定</a></nav></header>
<main class="page">
<div class="section-head"><div><div class="eyebrow">OPERATION DASHBOARD</div><h2>運営ダッシュボード</h2></div><button class="btn alt" onclick="resetData()">データを初期化</button></div>
<section class="dashboard" id="metrics"></section>
<section class="manager-grid">
<div class="panel" style="padding:26px"><div class="section-head" style="margin:0 0 14px"><h2>来館者管理</h2><span class="subtle">表示／非表示を切替</span></div><div style="overflow:auto"><table class="table"><thead><tr><th>名前</th><th>所属</th><th>区分</th><th>今日</th><th></th></tr></thead><tbody id="peopleRows"></tbody></table></div></div>
<div class="panel" style="padding:26px"><h2>本日の状況</h2><div id="hobbyStats"></div></div>
</section>
</main>
<script src="assets/data.js"></script><script src="assets/app.js"></script>
<script>
function renderManager(){
 const p=getPeople(), today=p.filter(x=>x.checked), guests=today.filter(x=>x.type==='guest');
 document.getElementById('metrics').innerHTML=[
 ['本日の来館',today.length+'人'],['レギュラー',today.length-guests.length+'人'],['ゲスト',guests.length+'人'],['登録者',p.length+'人']
 ].map(x=>`<div class="card metric"><span class="subtle">${x[0]}</span><strong>${x[1]}</strong></div>`).join('');
 document.getElementById('peopleRows').innerHTML=p.map(x=>`<tr><td><strong>${esc(x.name)}</strong></td><td>${esc(x.dept)}</td><td><span class="badge ${x.type==='guest'?'guest':''}">${x.type==='guest'?'ゲスト':'レギュラー'}</span></td><td>${x.checked?'表示中':'未チェックイン'}</td><td><button class="switch ${x.checked?'':'off'}" onclick="toggle(${x.id})">${x.checked?'非表示にする':'表示する'}</button></td></tr>`).join('');
 const stats=window.HOBBIES.map(h=>({name:h.name,icon:h.icon,n:today.filter(x=>x.hobbies.includes(h.name)).length})).sort((a,b)=>b.n-a.n).slice(0,6);
 document.getElementById('hobbyStats').innerHTML=stats.map(s=>`<div class="setting-row"><span>${s.icon} ${s.name}</span><strong>${s.n}人</strong></div>`).join('');
}
function toggle(id){const p=getPeople();const t=p.find(x=>x.id===id);t.checked=!t.checked;savePeople(p);renderManager()}
function resetData(){if(confirm('試作データを初期状態に戻しますか？')){localStorage.removeItem('cc_people');renderManager()}}
renderManager();
</script></body></html>
